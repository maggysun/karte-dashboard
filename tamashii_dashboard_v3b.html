<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🔥 魂スコア ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0F1923; --sf:#162230; --cd:#1C2D3E; --br:#243548;
    --ac:#E8734A; --bl:#4A90D9; --tl:#2DD4BF; --gd:#F59E0B;
    --tx:#E2EBF4; --mt:#6B8BA8; --dm:#2E4155; --gn:#34D399; --rd:#F87171;
    --yw:#F59E0B; --pu:#A78BFA;
    --font:'Georgia','Noto Serif JP',serif;
    --radius:12px; --header-h:56px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--tx);font-family:var(--font);min-height:100vh;overflow-x:hidden;}

  /* ── ヘッダー ── */
  #header{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--header-h);
    background:var(--sf);border-bottom:1px solid var(--br);
    display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:10px;}
  #header-title{display:flex;align-items:center;gap:8px;min-width:0;flex:1;}
  #header-accent{width:4px;height:24px;background:var(--ac);border-radius:2px;flex-shrink:0;}
  #header-text .sub{font-size:9px;color:var(--mt);letter-spacing:.1em;}
  #header-text .main{font-size:14px;font-weight:bold;white-space:nowrap;}
  #header-status{font-size:11px;color:var(--gn);white-space:nowrap;}
  #tabs{display:flex;gap:4px;flex-shrink:0;}
  .tab-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--br);background:transparent;
    color:var(--mt);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .2s;
    white-space:nowrap;min-height:34px;}
  .tab-btn.active{color:var(--ac);border-color:var(--ac);background:rgba(232,115,74,.12);}

  /* ── コンテンツ ── */
  #content{margin-top:var(--header-h);padding:16px;max-width:1100px;margin-left:auto;margin-right:auto;}

  /* ── カード ── */
  .card{background:var(--cd);border:1px solid var(--br);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .card-label{font-size:10px;color:var(--mt);letter-spacing:.06em;margin-bottom:6px;}

  /* ── KPI ── */
  #kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
  .kpi-card{background:var(--cd);border:1px solid var(--br);border-radius:var(--radius);padding:13px 14px;}
  .kpi-val{font-size:26px;font-weight:bold;}
  .kpi-sub{font-size:11px;color:var(--mt);}
  .mini-bar-wrap{height:4px;background:var(--dm);border-radius:2px;margin-top:8px;overflow:hidden;}
  .mini-bar-fill{height:100%;border-radius:2px;transition:width .8s ease;}

  /* ── メンバー ── */
  #mbr-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .mbr-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--br);background:transparent;
    color:var(--mt);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s;min-height:36px;}
  .mbr-btn.active{color:var(--ac);border-color:var(--ac);background:rgba(232,115,74,.12);}

  /* ── 月グリッド ── */
  #month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .mo-cell{background:var(--sf);border:1px solid var(--br);border-radius:9px;padding:9px 6px;
    cursor:pointer;text-align:center;transition:border-color .15s,transform .1s;user-select:none;}
  .mo-cell:hover{border-color:var(--ac);}
  .mo-cell:active{transform:scale(.96);}
  .mo-cell.has-data{border-color:rgba(232,115,74,.45);}
  .mo-label{font-size:10px;color:var(--mt);margin-bottom:2px;}
  .mo-score{font-size:18px;font-weight:bold;margin-bottom:2px;}
  .mo-max{font-size:9px;color:var(--dm);margin-bottom:4px;}
  .mo-icons{display:flex;justify-content:center;gap:2px;margin-top:4px;}
  .mo-icon{font-size:8px;}

  /* ── 入力 ── */
  #input-wrap{max-width:560px;margin:0 auto;}
  .metric-row{padding:14px 0;border-bottom:1px solid var(--br);}
  .metric-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .metric-name{font-size:13px;font-weight:bold;}
  .metric-icon{color:var(--ac);margin-right:6px;}
  .metric-badge{font-size:10px;color:var(--mt);margin-left:5px;}
  .metric-current{font-size:16px;font-weight:bold;}
  .metric-desc{font-size:10px;color:var(--mt);margin-bottom:9px;}
  .score-btns{display:flex;gap:8px;}
  .score-btn{width:44px;height:44px;border-radius:8px;border:1px solid var(--br);background:transparent;
    color:var(--mt);font-size:15px;font-weight:bold;cursor:pointer;font-family:var(--font);transition:all .15s;flex-shrink:0;}
  .score-btn.selected{background:var(--ac);color:#0F1923;border-color:var(--ac);}
  #score-preview{display:flex;justify-content:space-between;align-items:center;
    padding:13px 16px;background:var(--sf);border-radius:9px;margin:16px 0;}
  #preview-label{font-size:13px;color:var(--mt);}
  #preview-val{font-size:24px;font-weight:bold;color:var(--ac);}
  #preview-max{font-size:12px;color:var(--mt);}
  #save-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--ac);color:#0F1923;
    font-size:15px;font-weight:bold;cursor:pointer;font-family:var(--font);letter-spacing:.04em;transition:background .2s,transform .1s;}
  #save-btn:active{transform:scale(.98);}
  #save-btn:disabled{background:var(--dm);cursor:default;}
  #reset-link{background:none;border:none;color:var(--dm);font-size:11px;cursor:pointer;
    font-family:var(--font);text-decoration:underline;display:block;text-align:center;margin-top:14px;padding:8px;}

  /* ── ランキング ── */
  .rank-row{margin-bottom:12px;cursor:pointer;}
  .rank-row:hover .rank-name{color:var(--ac);}
  .rank-top{display:flex;justify-content:space-between;margin-bottom:4px;}
  .rank-name{font-size:13px;transition:color .15s;}
  .rank-pt{font-size:11px;color:var(--mt);}

  /* ── 2カラム ── */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  /* ── disabled ── */
  .disabled-row{opacity:.4;pointer-events:none;}
  .disabled-note{font-size:10px;color:var(--mt);margin-left:7px;}

  /* ── 入力選択 ── */
  .sel-label{font-size:10px;color:var(--mt);margin-bottom:7px;}
  .sel-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .sel-btn{padding:6px 12px;border-radius:14px;border:1px solid var(--br);background:transparent;
    color:var(--mt);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s;min-height:36px;}
  .sel-btn.active-mbr{color:var(--ac);border-color:var(--ac);background:rgba(232,115,74,.12);}
  .sel-btn.active-mon{color:var(--tl);border-color:var(--tl);background:rgba(45,212,191,.12);}

  /* ── メンバー別KPI ── */
  .mbr-kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}

  /* ════════════════════════════════════════════
     ── 年度切り替えタブ ──
  ════════════════════════════════════════════ */
  #fy-wrap{max-width:800px;margin:0 auto;}

  /* 年度ヘッダーバナー */
  #fy-banner{
    background:linear-gradient(135deg,#1C2D3E 0%,#162230 100%);
    border:1px solid var(--br);border-radius:var(--radius);
    padding:18px 20px;margin-bottom:16px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  }
  #fy-banner-left .fy-title{font-size:18px;font-weight:bold;}
  #fy-banner-left .fy-sub{font-size:11px;color:var(--mt);margin-top:3px;}
  #fy-progress-ring{text-align:center;}
  #fy-ring-label{font-size:10px;color:var(--mt);margin-top:4px;}

  /* 進捗サマリー */
  #fy-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .fy-sum-card{background:var(--cd);border:1px solid var(--br);border-radius:var(--radius);padding:13px 14px;text-align:center;}
  .fy-sum-val{font-size:22px;font-weight:bold;}
  .fy-sum-label{font-size:10px;color:var(--mt);margin-top:3px;}

  /* カテゴリ見出し */
  .fy-cat-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;border-radius:8px;cursor:pointer;
    user-select:none;transition:background .15s;margin-bottom:1px;
  }
  .fy-cat-header:hover{background:rgba(255,255,255,.03);}
  .fy-cat-left{display:flex;align-items:center;gap:10px;}
  .fy-cat-icon{font-size:16px;width:24px;text-align:center;}
  .fy-cat-name{font-size:14px;font-weight:bold;}
  .fy-cat-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:bold;}
  .fy-cat-badge.done{background:rgba(52,211,153,.15);color:var(--gn);}
  .fy-cat-badge.partial{background:rgba(245,158,11,.15);color:var(--yw);}
  .fy-cat-badge.none{background:rgba(107,139,168,.12);color:var(--mt);}
  .fy-cat-right{display:flex;align-items:center;gap:8px;}
  .fy-cat-frac{font-size:11px;color:var(--mt);}
  .fy-cat-arrow{font-size:12px;color:var(--mt);transition:transform .2s;}
  .fy-cat-arrow.open{transform:rotate(90deg);}

  /* チェックリスト */
  .fy-checklist{padding:0 14px 10px 14px;}
  .fy-item{
    display:flex;align-items:flex-start;gap:10px;
    padding:10px 12px;border-radius:8px;cursor:pointer;
    transition:background .15s;margin-bottom:2px;
  }
  .fy-item:hover{background:rgba(255,255,255,.04);}
  .fy-item:active{background:rgba(255,255,255,.07);}
  .fy-checkbox{
    width:20px;height:20px;border-radius:5px;border:2px solid var(--br);
    background:transparent;flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;
  }
  .fy-checkbox.checked{background:var(--gn);border-color:var(--gn);}
  .fy-checkbox.checked::after{content:'✓';color:#0F1923;font-size:12px;font-weight:bold;}
  .fy-item-body{flex:1;min-width:0;}
  .fy-item-title{font-size:13px;line-height:1.5;}
  .fy-item-title.checked{color:var(--mt);text-decoration:line-through;}
  .fy-item-desc{font-size:11px;color:var(--mt);margin-top:2px;line-height:1.5;}
  .fy-item-tag{
    display:inline-block;font-size:9px;padding:1px 7px;border-radius:8px;
    margin-top:4px;font-weight:bold;letter-spacing:.06em;
  }
  .fy-item-tag.march{background:rgba(167,139,250,.15);color:var(--pu);}
  .fy-item-tag.april{background:rgba(74,144,217,.15);color:var(--bl);}
  .fy-item-tag.confirm{background:rgba(245,158,11,.15);color:var(--yw);}
  .fy-item-tag.anytime{background:rgba(107,139,168,.12);color:var(--mt);}

  /* 注意ボックス */
  .fy-warn{
    background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);
    border-radius:9px;padding:12px 14px;margin:12px 0;
  }
  .fy-warn-title{font-size:12px;font-weight:bold;color:var(--rd);margin-bottom:5px;}
  .fy-warn-body{font-size:11px;color:var(--mt);line-height:1.7;}

  .fy-tip{
    background:rgba(45,212,191,.07);border:1px solid rgba(45,212,191,.2);
    border-radius:9px;padding:12px 14px;margin:12px 0;
  }
  .fy-tip-title{font-size:12px;font-weight:bold;color:var(--tl);margin-bottom:5px;}
  .fy-tip-body{font-size:11px;color:var(--mt);line-height:1.7;}

  /* 年度リセットボタン */
  #fy-reset-zone{
    background:var(--cd);border:1px dashed var(--br);border-radius:var(--radius);
    padding:16px;margin-top:16px;text-align:center;
  }
  #fy-reset-btn{
    padding:10px 24px;border-radius:8px;border:1px solid var(--rd);
    background:rgba(248,113,113,.08);color:var(--rd);
    font-size:13px;font-weight:bold;cursor:pointer;font-family:var(--font);
    transition:all .2s;
  }
  #fy-reset-btn:hover{background:rgba(248,113,113,.15);}
  #fy-reset-note{font-size:10px;color:var(--mt);margin-top:8px;}

  /* ── レスポンシブ ── */
  @media(max-width:820px){
    #kpi-grid{grid-template-columns:repeat(2,1fr);}
    .two-col{grid-template-columns:1fr;}
    #month-grid{grid-template-columns:repeat(4,1fr);}
    #fy-summary-grid{grid-template-columns:repeat(3,1fr);}
    .tab-btn{padding:5px 8px;font-size:11px;}
  }
  @media(max-width:500px){
    #header-text .main{font-size:13px;}
    .tab-btn{padding:4px 7px;font-size:10px;}
    #content{padding:12px 10px;}
    #kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
    .kpi-val{font-size:22px;}
    .two-col{grid-template-columns:1fr;}
    #month-grid{grid-template-columns:repeat(3,1fr);gap:7px;}
    .mbr-kpi-grid{grid-template-columns:repeat(2,1fr);}
    .card{padding:12px 13px;}
    .score-btn{width:48px;height:48px;font-size:16px;}
    #save-btn{font-size:16px;padding:16px;}
    #fy-summary-grid{grid-template-columns:repeat(2,1fr);}
    #fy-banner{flex-direction:column;}
  }
  @media(max-width:340px){
    #month-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<div id="header">
  <div id="header-title">
    <div id="header-accent"></div>
    <div id="header-text">
      <div class="sub">E⑩グループ　2026年度</div>
      <div class="main">🔥 魂スコア</div>
    </div>
  </div>
  <span id="header-status" style="display:none">✓ 保存済み</span>
  <div id="tabs">
    <button class="tab-btn active"  onclick="switchView('overview')">全体</button>
    <button class="tab-btn"         onclick="switchView('member')">メンバー</button>
    <button class="tab-btn"         onclick="switchView('input')">入力</button>
    <button class="tab-btn"         onclick="switchView('fy')">年度切替</button>
  </div>
</div>

<div id="content"></div>

<script>
/* ═══════════════════════════════════════════════════
   定数
═══════════════════════════════════════════════════ */
const MEMBERS=["白岩真由子","新野海","石井万央","輪湖祐一","加藤佑理","尾形喜将","中田陽馬"];
const MONTHS=["2026-04","2026-05","2026-06","2026-07","2026-08","2026-09","2026-10","2026-11","2026-12","2027-01","2027-02","2027-03"];
const ML=["4月","5月","6月","7月","8月","9月","10月","11月","12月","1月","2月","3月"];
const MTG=["2026-06","2026-11","2026-12","2027-03"];
const MX=[
  {key:"on1",        label:"1on1記録",    max:1,icon:"◎",desc:"NOTTA要約をKBに反映"},
  {key:"engagement", label:"充実感スコア", max:1,icon:"♡",desc:"数値でスコア記録済み"},
  {key:"observation",label:"観察ログ",    max:3,icon:"◈",desc:"観察エピソード件数（上限3点）"},
  {key:"strength",   label:"強み資産追記", max:1,icon:"★",desc:"強みエピソードを追記"},
  {key:"reflection", label:"振り返り記入", max:1,icon:"✦",desc:"NOTTAテンプレート振り返り3項目"},
  {key:"meeting",    label:"育成会議反映", max:1,icon:"⬡",desc:"会議コメントをKBに反映（開催月のみ）"},

const MAXPT=MX.reduce((s,m)=>s+m.max,0);
const C={ac:"#E8734A",bl:"#4A90D9",tl:"#2DD4BF",gd:"#F59E0B",mt:"#6B8BA8",dm:"#2E4155",gn:"#34D399",rd:"#F87171",yw:"#F59E0B",pu:"#A78BFA"};
const SK="tamashii_v6";
const SK_FY="tamashii_fy_v1";

/* ─── 年度切り替えチェックリスト定義 ─── */
const FY_CATS=[
  {
    id:"kb", icon:"📋", name:"KB（ナレッジベース）",
    items:[
      {id:"kb1", title:"継続メンバーKBの過去記録をアーカイブセクションへ移動",
       desc:"白岩・新野・石井の各KBで、旧年度の月次1on1記録をまとめて「## 過去記録アーカイブ（2026年度）」セクションに移動する。最新年度のみをアクティブとして残す。",
       tag:"march"},
      {id:"kb2", title:"退職・異動メンバーのKBをローカル保存してプロジェクトから削除",
       desc:"異動が確定したメンバーのKBファイルはMac上に保存してから、Claude Projectsのプロジェクトを削除または非アーカイブにする。",

      {id:"kb3", title:"新規メンバーのKB骨格ファイルを作成",
       desc:"新年度の新規着任者について、KB_[氏名]_v2.md の骨格ファイル（生成禁止ルール付き）を作成する。",
       tag:"april"},
      {id:"kb4", title:"前任者から新規メンバーの前年度評価情報を収集してKBに追記",
       desc:"前任マネージャーから書面・口頭で情報収集し、強み資産・フォーカスコンピテンシー・懸念事項をKBに記入する。",
       tag:"april"},
    ]
  },
  {
    id:"projects", icon:"🗂", name:"Claude Projects",
    items:[
      {id:"pj1", title:"全員共有ファイルの旧版を削除してから新版をアップロード",

       tag:"confirm"},
      {id:"pj2", title:"新規メンバーのプロジェクトを作成しKB骨格をアップロード",
       desc:"新着任者1人につき1プロジェクトを新規作成。KB_v2.md骨格、チーム編成_2027年度.md、観察ログ_2027年度.mdを投入する。",

  {

    items:[

      {id:"lg2", title:"人材育成会議ログ_2027年度.md を新規作成",

       tag:"march"},
      {id:"sk2", title:"kb-update-review：同上",
       desc:"kb-updateと同様に年度固定値を確認・更新。",
       tag:"march"},
      {id:"sk3", title:"1on1-prep：チーム編成ファイルの参照先を更新",

/* ═══════════════════════════════════════════════════
   データ管理
═══════════════════════════════════════════════════ */
function blankData(){
  const d={};
  MEMBERS.forEach(m=>{d[m]={};MONTHS.forEach(mo=>{d[m][mo]={on1:0,engagement:0,observation:0,strength:0,reflection:0,meeting:0};});});
  return d;
}
function loadScore(){try{const s=localStorage.getItem(SK);return s?JSON.parse(s):blankData();}catch{return blankData();}}
function saveScore(d){try{localStorage.setItem(SK,JSON.stringify(d));showSaved();}catch{alert("保存に失敗しました");}}
function loadFY(){try{const s=localStorage.getItem(SK_FY);return s?JSON.parse(s):{checks:{},openCats:{}};}catch{return{checks:{},openCats:{}};}}
function saveFY(d){try{localStorage.setItem(SK_FY,JSON.stringify(d));}catch{}}
function showSaved(){const el=document.getElementById("header-status");el.style.display="inline";el.textContent="✓ 保存済み";setTimeout(()=>el.style.display="none",2000);}

let DATA=loadScore();
let FY=loadFY();
let curMbr=MEMBERS[0];
let curMon=MONTHS[0];
let curEntry={};
let curView="overview";
let charts={};

/* ═══════════════════════════════════════════════════
   ユーティリティ
═══════════════════════════════════════════════════ */
const sc=(e)=>e?MX.reduce((s,m)=>s+Math.min(e[m.key]||0,m.max),0):0;
const pc=(p)=>p>=.75?C.ac:p>=.5?C.bl:p>=.25?C.tl:C.dm;
const hex=(c,a)=>{const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;};
const miniBar=(v,mx,c)=>`<div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${Math.min(v/mx,1)*100}%;background:${c}"></div></div>`;

/* ═══════════════════════════════════════════════════
   ビュー切替
═══════════════════════════════════════════════════ */
function switchView(v){
  curView=v;
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{
    b.classList.toggle("active",["overview","member","input","fy"][i]===v);
  });
  destroyCharts();render();
}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch{}});charts={};}

/* ═══════════════════════════════════════════════════
   レンダー（メイン）
═══════════════════════════════════════════════════ */
function render(){
  const el=document.getElementById("content");
  if(curView==="overview")el.innerHTML=renderOverview();
  else if(curView==="member")el.innerHTML=renderMember();
  else if(curView==="input")el.innerHTML=renderInput();
  else el.innerHTML=renderFY();
  if(curView==="overview")buildOverviewCharts();
  else if(curView==="member")buildMemberCharts();
}

/* ═══════════════════════════════════════════════════
   全体ビュー
═══════════════════════════════════════════════════ */
function renderOverview(){
  const tMo=MONTHS.map((mo,mi)=>{const s=MEMBERS.reduce((ss,m)=>ss+sc(DATA[m]?.[mo]),0);return{month:ML[mi],score:s,pct:s/(MEMBERS.length*MAXPT)};});
  let cum=0,ideal=0;
  const tCum=MONTHS.map((_,mi)=>{cum+=tMo[mi].score;ideal+=MEMBERS.length*MAXPT;return{month:ML[mi],実績:cum,理想:ideal};});
  const tTotal=tCum.at(-1).実績;
  const tMax=MEMBERS.length*MONTHS.length*MAXPT;
  const active=tMo.filter(m=>m.score>0);
  const avgRate=active.length>0?Math.round(active.reduce((s,m)=>s+m.pct,0)/active.length*100):0;
  const m0cnt=MEMBERS.filter(m=>sc(DATA[m]?.[MONTHS[0]])>0).length;
  const obsTotal=MONTHS.reduce((s,mo)=>s+MEMBERS.reduce((ss,m)=>ss+(DATA[m]?.[mo]?.observation||0),0),0);
  const mTot=MEMBERS.map(m=>{const t=MONTHS.reduce((s,mo)=>s+sc(DATA[m]?.[mo]),0);return{name:m,total:t,max:MONTHS.length*MAXPT};}).sort((a,b)=>b.total-a.total);
  const kpis=[
    {label:"年度累計スコア",val:tTotal,max:tMax,unit:"pt",col:C.ac},
    {label:"平均月間達成率",val:avgRate,max:100,unit:"%",col:C.bl},
    {label:"今月記録メンバー",val:m0cnt,max:MEMBERS.length,unit:"名",col:C.tl},
    {label:"観察ログ累計",val:obsTotal,max:null,unit:"件",col:C.gd},
  ];
  return`
    <div id="kpi-grid">
      ${kpis.map(k=>`
        <div class="kpi-card">
          <div class="card-label">${k.label}</div>
          <div style="display:flex;align-items:baseline;gap:3px;margin-bottom:${k.max?'6px':'0'}">
            <span class="kpi-val" style="color:${k.col}">${k.val}</span>
            <span class="kpi-sub">${k.max?'/ '+k.max:''}${k.unit}</span>
          </div>
          ${k.max?miniBar(Number(k.val),k.max,k.col):''}
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-label">チーム累積スコア推移</div>
      <div style="font-size:10px;color:var(--dm);margin-bottom:10px">橙＝実績　点線＝理想値（7名×${MAXPT}pt×12ヶ月）</div>
      <canvas id="chart-cum" height="160"></canvas>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-label" style="margin-bottom:12px">メンバー別　年度累計ランキング</div>
        ${mTot.map((m,i)=>`
          <div class="rank-row" onclick="setMbrAndSwitch('${m.name}')">
            <div class="rank-top">
              <span class="rank-name">${i===0?'🔥 ':''}${m.name}</span>
              <span class="rank-pt">${m.total}/${m.max}pt</span>
            </div>
            ${miniBar(m.total,m.max,i===0?C.ac:i<3?C.bl:C.mt)}
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-label">指標別バランス（直近3ヶ月チーム平均）</div>
        <div style="font-size:10px;color:var(--dm);margin-bottom:8px">凸凹が手薄な指標を示す</div>
        <canvas id="chart-radar" height="200"></canvas>
      </div>
    </div>`;
}
function buildOverviewCharts(){
  let cum=0,ideal=0;
  const lb=[],cr=[],ci=[];
  MONTHS.forEach((_,mi)=>{const s=MEMBERS.reduce((ss,m)=>ss+sc(DATA[m]?.[MONTHS[mi]]),0);cum+=s;ideal+=MEMBERS.length*MAXPT;lb.push(ML[mi]);cr.push(cum);ci.push(ideal);});
  const ctx1=document.getElementById("chart-cum").getContext("2d");
  charts.cum=new Chart(ctx1,{type:"line",data:{labels:lb,datasets:[
    {label:"理想値",data:ci,borderColor:"#2E4155",borderDash:[4,4],pointRadius:0,fill:false,tension:.3},
    {label:"実績",data:cr,borderColor:C.ac,borderWidth:2.5,backgroundColor:(ctx)=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,160);g.addColorStop(0,hex(C.ac,.3));g.addColorStop(1,hex(C.ac,0));return g;},fill:true,tension:.3,pointRadius:3,pointBackgroundColor:C.ac},
  ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{backgroundColor:"#162230",titleColor:"#E2EBF4",bodyColor:"#E2EBF4",borderColor:"#243548",borderWidth:1}},scales:{x:{grid:{color:"#2E4155"},ticks:{color:"#6B8BA8",font:{size:10}}},y:{grid:{color:"#2E4155"},ticks:{color:"#6B8BA8",font:{size:10}}}}}});
  const rData=MX.map(mx=>{const avg=MEMBERS.reduce((s,m)=>s+Math.min(MONTHS.slice(0,3).reduce((ss,mo)=>ss+(DATA[m]?.[mo]?.[mx.key]||0),0),mx.max*3),0)/MEMBERS.length;return Math.round(avg*10)/10;});
  const ctx2=document.getElementById("chart-radar").getContext("2d");
  charts.radar=new Chart(ctx2,{type:"radar",data:{labels:MX.map(m=>m.label),datasets:[{data:rData,backgroundColor:hex(C.tl,.2),borderColor:C.tl,borderWidth:2,pointBackgroundColor:C.tl,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{r:{grid:{color:"#2E4155"},angleLines:{color:"#2E4155"},ticks:{color:"#6B8BA8",font:{size:9},backdropColor:"transparent"},pointLabels:{color:"#6B8BA8",font:{size:10}}}}}});
}

  ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{backgroundColor:"#162230",titleColor:"#E2EBF4",bodyColor:"#E2EBF4",borderColor:"#243548",borderWidth:1}},scales:{x:{grid:{color:"#2E4155"},ticks:{color:"#6B8BA8",font:{size:10}}},y:{grid:{color:"#2E4155"},ticks:{color:"#6B8BA8",font:{size:10}}}}}});

/* ═══════════════════════════════════════════════════
   入力ビュー
═══════════════════════════════════════════════════ */
function openInput(mbr,mo){curMbr=mbr;curMon=mo;curEntry={...(DATA[mbr]?.[mo]||{on1:0,engagement:0,observation:0,strength:0,reflection:0,meeting:0})};switchView('input');}
function selInputMbr(name){curMbr=name;curEntry={...(DATA[name]?.[curMon]||{on1:0,engagement:0,observation:0,strength:0,reflection:0,meeting:0})};render();}
function selInputMon(mo){curMon=mo;curEntry={...(DATA[curMbr]?.[mo]||{on1:0,engagement:0,observation:0,strength:0,reflection:0,meeting:0})};render();}
function setScore(key,val){curEntry[key]=val;render();}
function calcPreview(){return MX.reduce((s,m)=>{if(m.key==="meeting"&&!MTG.includes(curMon))return s;return s+Math.min(curEntry[m.key]||0,m.max);},0);}
function commitSave(){
  const btn=document.getElementById("save-btn");btn.disabled=true;btn.textContent="保存中…";
  DATA[curMbr][curMon]={...curEntry};saveScore(DATA);
  btn.textContent="✓ 保存しました";setTimeout(()=>{btn.disabled=false;btn.textContent="保存する";},1500);
}
function resetAll(){
  if(!confirm("全スコアデータをリセットしますか？\nこの操作は元に戻せません。"))return;
  DATA=blankData();saveScore(DATA);render();
}

}

function fyGetTagHTML(tag){
  const map={march:{cls:"march",txt:"3月中"},april:{cls:"april",txt:"4月頭"},confirm:{cls:"confirm",txt:"要確認"},anytime:{cls:"anytime",txt:"随時"}};
  const t=map[tag]||map.anytime;
  return`<span class="fy-item-tag ${t.cls}">${t.txt}</span>`;
}

function renderFY(){
  // 全体進捗カウント
  const allItems=FY_CATS.flatMap(c=>c.items);
  const totalItems=allItems.length;
  const doneItems=allItems.filter(i=>FY.checks[i.id]).length;
  const pct=Math.round(doneItems/totalItems*100);

  // カテゴリ別カウント
  const catCounts=FY_CATS.map(c=>{
    const total=c.items.length;
    const done=c.items.filter(i=>FY.checks[i.id]).length;
    return{id:c.id,done,total};
  });

  // 月別タスク数（3月・4月）
  const marchItems=allItems.filter(i=>i.tag==="march"||i.tag==="confirm").length;
  const marchDone=allItems.filter(i=>(i.tag==="march"||i.tag==="confirm")&&FY.checks[i.id]).length;
  const aprilItems=allItems.filter(i=>i.tag==="april").length;
  const aprilDone=allItems.filter(i=>i.tag==="april"&&FY.checks[i.id]).length;

  // 円グラフ（SVG）
  const r=36,cx=44,cy=44,circ=2*Math.PI*r;
  const dash=pct/100*circ;
  const ringColor=pct===100?C.gn:pct>=50?C.ac:C.bl;

  return`
  <div id="fy-wrap">

    <!-- バナー -->
    <div id="fy-banner">
      <div id="fy-banner-left">
        <div class="fy-title">📅 年度切り替えガイド　2026→2027年度</div>
        <div class="fy-sub">このチェックリストを3月末までに完了させると、4月1日からスムーズに運用できます</div>
      </div>
      <div id="fy-progress-ring">
        <svg width="88" height="88" style="transform:rotate(-90deg)">
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2E4155" stroke-width="7"/>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${ringColor}" stroke-width="7"
            stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray .8s ease"/>
        </svg>
        <div style="position:relative;margin-top:-60px;text-align:center;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <span style="font-size:18px;font-weight:bold;color:${ringColor}">${pct}%</span>
          <span style="font-size:9px;color:var(--mt)">${doneItems}/${totalItems}</span>
        </div>
        <div id="fy-ring-label" style="margin-top:6px">完了率</div>
      </div>
    </div>

    <!-- サマリー -->
    <div id="fy-summary-grid">
      <div class="fy-sum-card">
        <div class="fy-sum-val" style="color:${C.pu}">${marchDone}<span style="font-size:13px;color:var(--mt)">/${marchItems}</span></div>
        <div class="fy-sum-label">3月中タスク　完了数</div>
        ${miniBar(marchDone,marchItems,C.pu)}
      </div>
      <div class="fy-sum-card">
        <div class="fy-sum-val" style="color:${C.bl}">${aprilDone}<span style="font-size:13px;color:var(--mt)">/${aprilItems}</span></div>
        <div class="fy-sum-label">4月頭タスク　完了数</div>
        ${miniBar(aprilDone,aprilItems,C.bl)}
      </div>
      <div class="fy-sum-card">
        <div class="fy-sum-val" style="color:${C.rd}">${totalItems-doneItems}</div>
        <div class="fy-sum-label">残りタスク数</div>
      </div>
    </div>

    <!-- 最重要注意 -->
    <div class="fy-warn">
      <div class="fy-warn-title">⚠ 最重要：必ずこの順番で実施してください</div>
      <div class="fy-warn-body">
        Claude Projectsのファイルを更新する際は、<strong style="color:var(--rd)">古いファイルを削除してから新しいファイルを追加</strong>してください。<br>
        同種のファイルが2枚存在すると、スキル（Cowork）がどちらを参照するか不定になり、古い情報で動作するリスクがあります。<br>
        順番：①旧ファイルを削除　→　②新ファイルをアップロード　→　③動作確認
      </div>
    </div>

    <!-- チェックリスト（カテゴリ別アコーディオン） -->
    ${FY_CATS.map(cat=>{
      const cc=catCounts.find(c=>c.id===cat.id);
      const isOpen=!!FY.openCats[cat.id];
      const badgeCls=cc.done===cc.total?'done':cc.done>0?'partial':'none';
      const badgeTxt=cc.done===cc.total?'完了':cc.done>0?`${cc.done}/${cc.total}`:'未着手';
      return`
        <div class="card" style="padding:0;overflow:hidden;margin-bottom:8px">
          <div class="fy-cat-header" onclick="fyToggleCat('${cat.id}')">
            <div class="fy-cat-left">
              <span class="fy-cat-icon">${cat.icon}</span>
              <span class="fy-cat-name">${cat.name}</span>
              <span class="fy-cat-badge ${badgeCls}">${badgeTxt}</span>
            </div>
            <div class="fy-cat-right">
              <span class="fy-cat-frac">${cc.done}/${cc.total}</span>
              <span class="fy-cat-arrow ${isOpen?'open':''}">›</span>
            </div>
          </div>
          ${isOpen?`
          <div style="height:3px;background:var(--dm);margin:0 14px"></div>
          <div class="fy-checklist">
            ${cat.items.map(item=>{
              const checked=!!FY.checks[item.id];
              return`
                <div class="fy-item" onclick="fyToggleItem('${item.id}')">
                  <div class="fy-checkbox ${checked?'checked':''}"></div>
                  <div class="fy-item-body">
                    <div class="fy-item-title ${checked?'checked':''}">${item.title}</div>
                    <div class="fy-item-desc">${item.desc}</div>
                    ${fyGetTagHTML(item.tag)}
                  </div>
                </div>`;
            }).join('')}
          </div>
          `:''}
        </div>`;
    }).join('')}

    <!-- Tipボックス -->
    <div class="fy-tip">
      <div class="fy-tip-title">💡 新年度版ファイル一式の生成について</div>
      <div class="fy-tip-body">
        マニュアル・PPTX・ダッシュボード・スキルファイルの新年度版は、すべてこのチャット（Claude）に依頼することで生成できます。<br>
        その際はメンバー構成の確定情報（氏名・等級・役割・チーム活動）を事前に整理して伝えると、作業がスムーズです。<br>
        <strong style="color:var(--tl)">「2027年度版の一式を作って」</strong>と伝えるだけで対応できます。
      </div>
    </div>

    <!-- リセット -->
    <div id="fy-reset-zone">
      <button id="fy-reset-btn" onclick="fyResetChecks()">チェックリストをリセット</button>
      <div id="fy-reset-note">次年度に向けて作業を開始するタイミングで使用してください</div>
    </div>

  </div>`;
}

/* ═══════════════════════════════════════════════════
   初期化
═══════════════════════════════════════════════════ */
render();
</script>
<script src="supabase_override.js"></script></body>
</html>
